<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Relative Positioning</title>
        <style>
            /* Moves an element while keeping its original posistion reserved */

            /* Try changing top and left to different values,
            and inspect in the browser to see affected changes. */
            .box {
                position: relative;
                top: 0px;
                left: 80px;
                background-color: #f2f2f2;
                padding: 20px;
                border: 1px solid #ccc;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="box">This ia a box with relative positioning.</div>
        </div>
    </body>
</html>
