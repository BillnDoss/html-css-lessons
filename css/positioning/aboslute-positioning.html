<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Absolute Positioning</title>
        <!-- Absolute Positioning will stop working if there is no parent/ancestor box with the position: relative; tag it is similiar -->
        <!-- Absolute Positioning will only work IF it has a parent OR ancestor with relative positioning.
      It does not work if the parent or ancestor is not of relative positioning, sice it is relative TO the ancestor's positioning. -->
        <style>
            .box {
                position: relative;
                top: 20px;
                background-color: #f2f2f2;
                padding: 20px;
                border: 1px solid #ccc;
            }

            .child-box {
                position: absolute;
                top: 20px;
                left: 20px;
                background-color: #ddd;
                padding: 10px;
                border: 1px solid #999;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="box">
                This is the parent box.
                <div class="child-box">
                    This is the child box with absolute positioning.
                </div>
            </div>
        </div>
    </body>
</html>
