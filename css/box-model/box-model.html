<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Example</title>
    <style>
        /* content box only uses content to determine width and height */
        /* border box uses the entire element to determine w and h */
        .box {
            box-sizing: border-box;
            width: 100px;
            height: 100px;
            background-color: lightblue;
            padding: 35px;
            border: 5px solid blue;
            margin: auto;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="box">Hello!</div>
    
</body>
</html>
